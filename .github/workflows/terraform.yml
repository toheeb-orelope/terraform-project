name: Terraform CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Choose Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: production

    env:
      TF_VAR_ec2_public_key: ${{ secrets.EC2_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_my_ip_cidr: ${{ secrets.MY_IP_CIDR }}
      TF_VAR_kms_key_id: ${{ secrets.KMS_KEY_ID }}
      TF_VAR_bucket_name: project-363238514491-us-east-1-an
      TF_VAR_aws_region: us-east-1
      TF_VAR_account_id: "363238514491"
      TF_VAR_environment: dev

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Upload Terraform plan
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan
          retention-days: 1

      - name: Verify identity
        run: aws sts get-caller-identity

  apply:
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: production

    env:
      TF_VAR_ec2_public_key: ${{ secrets.EC2_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_my_ip_cidr: ${{ secrets.MY_IP_CIDR }}
      TF_VAR_kms_key_id: ${{ secrets.KMS_KEY_ID }}
      TF_VAR_bucket_name: project-363238514491-us-east-1-an
      TF_VAR_aws_region: us-east-1
      TF_VAR_account_id: "363238514491"
      TF_VAR_environment: dev

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

  destroy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: production

    env:
      TF_VAR_ec2_public_key: ${{ secrets.EC2_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_my_ip_cidr: ${{ secrets.MY_IP_CIDR }}
      TF_VAR_kms_key_id: ${{ secrets.KMS_KEY_ID }}
      TF_VAR_bucket_name: project-363238514491-us-east-1-an
      TF_VAR_aws_region: us-east-1
      TF_VAR_account_id: "363238514491"
      TF_VAR_environment: dev

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform destroy plan
        run: terraform plan -destroy -input=false

      - name: Terraform destroy
        run: terraform destroy -input=false -auto-approve